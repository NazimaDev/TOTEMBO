{% load static %}
{% load i18n %}

{% block header %}
<div class="header_panel">
    <div class="header_panel-item header_panel-item-search">
        <form class="header_search-form" action="{% url 'search' %}" method="get">
            <input type="text" name="q" class="header_search-input" placeholder="{% trans 'Поиск по товарам...' %}">
            <button type="submit" class="header_search-btn">OK</button>
        </form>
        <button type="button" class="btn p-0 border-0 bg-transparent js-header-search-toggle" aria-label="{% trans 'Поиск' %}">
            <span class="header-icon-wrapper">
                <img class="header_icon header_icon-white" src="{% static 'images/icons/search_icon.svg' %}" alt="{% trans 'Поиск' %}">
            </span>
        </button>
    </div>

    <div class="header_panel-item">
        <a href="{% url 'cart' %}">
            <span class="header-icon-wrapper">
                <img class="header_icon" src="{% static 'images/icons/cart.svg' %}" alt="{% trans 'Корзина' %}">
                <span id="header-cart-count"
                      class="header_badge header_badge-cart {% if not cart_count %}hidden-badge{% endif %}">
                    {{ cart_count|default:0 }}
                </span>
            </span>
        </a>
    </div>

    <div class="header_panel-item">
        <a href="{% url 'favorites' %}">
            <span class="header-icon-wrapper">
                <img class="header_icon header_icon-white" src="{% static 'images/icons/heart.svg' %}" alt="{% trans 'Избранное' %}">
                <span id="header-fav-count"
                      class="header_badge header_badge-fav {% if not favorites_count %}hidden-badge{% endif %}">
                    {{ favorites_count|default:0 }}
                </span>
            </span>
        </a>
    </div>

    <div class="header_panel-item dropdown">
        <button type="button" class="btn p-0 border-0 bg-transparent dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown" aria-expanded="false" aria-label="{% trans 'Язык' %}">
            <span class="header-icon-wrapper">
                {% if request.LANGUAGE_CODE == 'en' %}
                <img class="header_icon header_icon-white" src="{% static 'images/icons/en_lang_icon.svg' %}" alt="{% trans 'Язык' %}">
                {% else %}
                <img class="header_icon header_icon-white" src="{% static 'images/icons/ru_lang_icon.svg' %}" alt="{% trans 'Язык' %}">
                {% endif %}
            </span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <form method="post" action="{% url 'set_language' %}" class="lang-form">
                    {% csrf_token %}
                    <input name="next" type="hidden" value="{{ request.get_full_path }}">
                    <input name="language" type="hidden" value="ru">
                    <button type="submit" class="dropdown-item js-lang-submit {% if request.LANGUAGE_CODE == 'ru' %}active{% endif %}">Русский</button>
                </form>
            </li>
            <li>
                <form method="post" action="{% url 'set_language' %}" class="lang-form">
                    {% csrf_token %}
                    <input name="next" type="hidden" value="{{ request.get_full_path }}">
                    <input name="language" type="hidden" value="en">
                    <button type="submit" class="dropdown-item js-lang-submit {% if request.LANGUAGE_CODE == 'en' %}active{% endif %}">English</button>
                </form>
            </li>
        </ul>
    </div>

    <div class="header_panel-item">
        {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}" class="header_panel-item-link">
                <span class="header-icon-wrapper">
                    <img class="header_icon header_icon-white header_icon-leave" src="{% static 'images/free-icon-logout-3889524.png' %}" alt="{% trans 'Выйти' %}">
                </span>
            </a>
        {% else %}
            <a href="#" class="header_panel-item-link" data-bs-toggle="modal" data-bs-target="#authLoginModal" role="button">
                <span class="header-icon-wrapper">
                    <img class="header_icon header_icon-white" src="{% static 'images/icons/circum_login.svg' %}" alt="{% trans 'Вход' %}">
                </span>
            </a>
        {% endif %}
    </div>
</div>
{% endblock header %}
